services:
  api:
    build: .
    container_name: authentication-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./sqlite_data:/app/sqlite_data
    networks:
      - web
      - authentication
    labels:
      - 'traefik.docker.network=web'
      - 'traefik.enable=true'
      - 'traefik.http.routers.authentication.rule=Host(`authentication.sarasjodin.se`)'
      - 'traefik.http.routers.authentication.entrypoints=websecure'
      - 'traefik.http.routers.authentication.tls=true'
      - 'traefik.http.routers.authentication.tls.certresolver=myresolver'
      - 'traefik.http.services.authentication.loadbalancer.server.port=3001'

networks:
  web:
    external: true
  authentication:
    driver: bridge
